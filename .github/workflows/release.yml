name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish Linux
        run: |
          dotnet publish src/Looma.App/Looma.App.csproj \
            -c Release -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish/linux

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Pack Linux
        run: |
          vpk pack \
            --packId Looma \
            --packVersion ${{ steps.version.outputs.VERSION }} \
            --packDir ./publish/linux \
            --mainExe Looma.App \
            --outputDir ./releases/linux

      - name: Publish Linux to GitHub
        run: |
          vpk upload github \
            --repoUrl https://github.com/${{ github.repository }} \
            --publish \
            --releaseName "Looma v${{ steps.version.outputs.VERSION }}" \
            --tag ${{ github.ref_name }} \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --outputDir ./releases/linux \
            --merge

  build-windows:
    runs-on: windows-latest
    needs: build-linux
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish Windows
        run: |
          dotnet publish src/Looma.App/Looma.App.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./publish/win

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Pack Windows
        run: |
          vpk pack `
            --packId Looma `
            --packVersion ${{ steps.version.outputs.VERSION }} `
            --packDir ./publish/win `
            --mainExe Looma.App.exe `
            --outputDir ./releases/win

      - name: Publish Windows to GitHub
        run: |
          vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --publish `
            --releaseName "Looma v${{ steps.version.outputs.VERSION }}" `
            --tag ${{ github.ref_name }} `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir ./releases/win `
            --merge